[build]
  command = "if cd flutter; then git checkout stable && git pull && cd ..; else git clone -b stable https://github.com/flutter/flutter.git; fi && flutter/bin/flutter config --enable-web && flutter/bin/flutter build web --release"
  publish = "build/web"

[build.environment]
  FLUTTER_VERSION = "3.41.3"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
